name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild every 6 hours so /changelog picks up new GitHub releases
  # even if no commit landed in winsentinel-site.
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build /changelog from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-changelog.mjs changelog.html

      # Keep per-post OG cards in sync with post titles, then rasterize every
      # og/*.svg -> og/*.png so social unfurls always match what's deployed.
      - name: Build per-post OG images
        run: |
          node scripts/build-blog-og.mjs
          npm install --no-save sharp
          node scripts/generate-og-images.js

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
