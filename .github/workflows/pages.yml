name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild every 6 hours so /changelog picks up new GitHub releases
  # even if no commit landed in winsentinel-site.
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build /changelog from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/build-changelog.mjs changelog.html

      # Keep per-post OG cards in sync with post titles, then rasterize every
      # og/*.svg -> og/*.png so social unfurls always match what's deployed.
      - name: Build per-post OG images
        run: |
          node scripts/build-blog-og.mjs
          npm install --no-save sharp
          node scripts/generate-og-images.js

      # Rebuild the blog index + Atom feed from the post pages (source of truth)
      # so /blog and /blog/feed.xml never drift from what's on disk. Without this
      # a post added without manually running these generators ships an index or
      # feed that's missing it (the feed silently lagged the index by 4 posts
      # before this step existed). Both generators are idempotent and derive
      # their dates from each post's JSON-LD, not the wall clock.
      - name: Rebuild blog index + Atom feed
        run: |
          node scripts/build-blog-index.mjs
          node scripts/build-blog-feed.mjs

      # Rebuild /modules (modules.html) from data/modules.json (the source of
      # truth, mirroring WinSentinel.Core/Audits/*Audit.cs) so the page never
      # drifts from the shipped audit-module list. build-modules.mjs emits the
      # bare page WITHOUT the cookieless Cloudflare analytics loader, so we
      # immediately re-run add-analytics.py to re-inject it (idempotent: a no-op
      # on the 76 already-wired pages, restores only the just-regenerated
      # modules.html). Same deploy-time self-heal pattern as changelog / OG /
      # blog feed / security.txt above; without it a module added to
      # modules.json ships a stale /modules page until someone runs the
      # generator by hand.
      - name: Rebuild /modules page
        run: |
          node scripts/build-modules.mjs
          python3 scripts/add-analytics.py

      # Regenerate .well-known/security.txt so its RFC 9116 `Expires` field is
      # always fresh (the 6-hourly schedule means the deployed file never goes
      # stale / past-expiry, which crawlers treat as invalid).
      - name: Refresh security.txt (RFC 9116)
        run: |
          node scripts/build-security-txt.mjs
          node scripts/build-security-txt.mjs --check

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
