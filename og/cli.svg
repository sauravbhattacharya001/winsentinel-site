<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#070a11"/>
      <stop offset="100%" stop-color="#0b0f17"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- shield mark -->
  <path d="M150 150 100 175v70c0 60 40 100 100 120 60-20 100-60 100-120v-70l-50-25z" fill="#38bdf8" opacity="0.12"/>
  <path d="M170 250 l25 25 45-50" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="360" y="205" font-family="Inter, system-ui, sans-serif" font-size="70" font-weight="700" fill="white">CLI reference</text>
  <text x="360" y="265" font-family="Inter, system-ui, sans-serif" font-size="30" fill="#94a3b8">Every WinSentinel command, in one place.</text>

  <!-- terminal card -->
  <rect x="100" y="330" width="1000" height="180" rx="14" fill="#0b0f17" stroke="#1a2030" stroke-width="1.5"/>
  <circle cx="130" cy="362" r="7" fill="#f87171" opacity="0.8"/>
  <circle cx="152" cy="362" r="7" fill="#fbbf24" opacity="0.8"/>
  <circle cx="174" cy="362" r="7" fill="#34d399" opacity="0.8"/>
  <line x1="100" y1="384" x2="1100" y2="384" stroke="#1a2030" stroke-width="1.5"/>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="26">
    <text x="130" y="430" fill="#7dd3fc">$ winsentinel --audit</text>
    <text x="130" y="468" fill="#e2e8f0">Security Score: <tspan fill="#6ee7b7">92/100</tspan>  Grade: <tspan fill="#6ee7b7">A</tspan></text>
  </g>

  <text x="100" y="560" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#e2e8f0">audit &#183; score &#183; fix-all &#183; export &#183; monitor &#183; schedule &#8212; all free on a single machine.</text>
  <text x="100" y="600" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#64748b">winsentinel.ai/docs/cli</text>
  <rect x="0" y="610" width="1200" height="20" fill="#38bdf8" opacity="0.3"/>
</svg>
