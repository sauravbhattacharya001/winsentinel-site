  <text x="641" y="437" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" fill="#94a3b8">CrowdStrike</text>
  <rect x="742" y="404" width="128" height="52" rx="8" fill="#11161f" stroke="#334155" stroke-width="1"/>
  <text x="806" y="437" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" fill="#94a3b8">Nessus</text>
  <rect x="892" y="404" width="138" height="52" rx="8" fill="#11161f" stroke="#334155" stroke-width="1"/>
  <text x="961" y="437" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="19" fill="#94a3b8">Qualys +8</text>
