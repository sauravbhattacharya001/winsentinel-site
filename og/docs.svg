<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#070a11"/>
      <stop offset="100%" stop-color="#0b0f17"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- shield mark -->
  <path d="M150 150 100 175v70c0 60 40 100 100 120 60-20 100-60 100-120v-70l-50-25z" fill="#38bdf8" opacity="0.12"/>
  <path d="M170 250 l25 25 45-50" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="360" y="205" font-family="Inter, system-ui, sans-serif" font-size="70" font-weight="700" fill="white">Documentation</text>
  <text x="360" y="265" font-family="Inter, system-ui, sans-serif" font-size="30" fill="#94a3b8">Everything you need to run WinSentinel.</text>

  <!-- three doc cards -->
  <g font-family="Inter, system-ui, sans-serif">
    <rect x="100" y="330" width="315" height="180" rx="14" fill="#0b0f17" stroke="#1a2030" stroke-width="1.5"/>
    <text x="130" y="392" font-size="28" font-weight="700" fill="#7dd3fc">CLI reference</text>
    <text x="130" y="430" font-size="21" fill="#94a3b8">Every command,</text>
    <text x="130" y="458" font-size="21" fill="#94a3b8">option &amp; exit code.</text>

    <rect x="443" y="330" width="315" height="180" rx="14" fill="#0b0f17" stroke="#1a2030" stroke-width="1.5"/>
    <text x="473" y="392" font-size="28" font-weight="700" fill="#7dd3fc">Audit modules</text>
    <text x="473" y="430" font-size="21" fill="#94a3b8">Every check</text>
    <text x="473" y="458" font-size="21" fill="#94a3b8">WinSentinel runs.</text>

    <rect x="786" y="330" width="314" height="180" rx="14" fill="#0b0f17" stroke="#1a2030" stroke-width="1.5"/>
    <text x="816" y="392" font-size="28" font-weight="700" fill="#7dd3fc">Fleet &amp; RBAC</text>
    <text x="816" y="430" font-size="21" fill="#94a3b8">Set up Pro fleet</text>
    <text x="816" y="458" font-size="21" fill="#94a3b8">management.</text>
  </g>

  <text x="100" y="560" font-family="Inter, system-ui, sans-serif" font-size="24" fill="#e2e8f0">Install, audit, score, fix, and manage a fleet &#8212; start here.</text>
  <text x="100" y="600" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#64748b">winsentinel.ai/docs</text>
  <rect x="0" y="610" width="1200" height="20" fill="#38bdf8" opacity="0.3"/>
</svg>
